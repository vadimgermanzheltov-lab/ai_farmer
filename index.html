<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Умный птичник</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-5" />
  </head>
  <body>
    <div id="app"></div>

    <script>
      (function () {
        var app = document.getElementById('app');
        if (!app) return;

        var birds = {
          chickens: {
            name: 'Куры',
            breeds: ['Ломан Браун', 'Хайсекс Браун', 'Кучинская юбилейная'],
            indoor: 0.35,
            run: 1.2,
            feed: 120,
            pros: ['простой старт', 'понятный уход', 'хороший вариант для семьи']
          },
          ducks: {
            name: 'Утки',
            breeds: ['Пекинская', 'Башкирская', 'Муларды'],
            indoor: 0.5,
            run: 2,
            feed: 180,
            pros: ['подходят для мяса', 'быстрый рост', 'активно используют выгул']
          },
          geese: {
            name: 'Гуси',
            breeds: ['Линдовская', 'Холмогорская'],
            indoor: 0.8,
            run: 5,
            feed: 250,
            pros: ['подходят для просторного участка', 'хороши на выгуле']
          },
          turkeys: {
            name: 'Индюки',
            breeds: ['БИГ-6', 'Белая широкогрудая'],
            indoor: 0.8,
            run: 3,
            feed: 250,
            pros: ['перспективны для мяса', 'подходят для продажи']
          },
          quails: {
            name: 'Перепела',
            breeds: ['Японский перепел', 'Фараон'],
            indoor: 0.03,
            run: 0,
            feed: 30,
            pros: ['компактный формат', 'быстрый старт', 'удобны для мини-проекта']
          }
        };

        var scenarios = {
          choose_poultry: {
            title: 'Выбрать птицу',
            goal: 'Подобрать вид птицы и подходящий старт',
            questions: [
              { id: 'purpose', text: 'Для какой цели?', options: [
                { value: 'eggs', label: 'Яйца' },
                { value: 'meat', label: 'Мясо' },
                { value: 'universal', label: 'Яйца и мясо' },
                { value: 'sale', label: 'Продажа' }
              ]},
              { id: 'experience', text: 'Какой опыт?', options: [
                { value: 'beginner', label: 'Новичок' },
                { value: 'some', label: 'Есть опыт' },
                { value: 'farmer', label: 'Фермер' }
              ]},
              { id: 'warmHousing', text: 'Есть тёплое помещение?', options: [
                { value: 'yes', label: 'Да' },
                { value: 'no', label: 'Нет' },
                { value: 'planned', label: 'Планирую построить' }
              ]}
            ]
          },
          calculate_farm: {
            title: 'Рассчитать хозяйство',
            goal: 'Посчитать площадь, выгул и корм',
            questions: [
              { id: 'birdType', text: 'Какую птицу планируете содержать?', options: birdOptions() },
              { id: 'count', text: 'Сколько голов?', options: countOptions() },
              { id: 'farmGoal', text: 'Какая цель?', options: [
                { value: 'family', label: 'Для семьи' },
                { value: 'sale', label: 'Для продажи' },
                { value: 'test', label: 'Тестовый запуск' }
              ]}
            ]
          },
          feeding: {
            title: 'Подобрать кормление',
            goal: 'Собрать базовую схему кормления',
            questions: [
              { id: 'birdType', text: 'Какую птицу кормим?', options: birdOptions() },
              { id: 'age', text: 'Какой возраст?', options: [
                { value: 'chicks', label: 'Птенцы' },
                { value: 'young', label: 'Молодняк' },
                { value: 'adult', label: 'Взрослая птица' }
              ]},
              { id: 'goal', text: 'Какая цель кормления?', options: [
                { value: 'eggs', label: 'Яйцо' },
                { value: 'meat', label: 'Мясо' },
                { value: 'health', label: 'Поддержание здоровья' }
              ]}
            ]
          },
          economics: {
            title: 'Прикинуть экономику',
            goal: 'Сравнить затраты и результат на старте',
            questions: [
              { id: 'birdType', text: 'Для какой птицы считаем?', options: birdOptions() },
              { id: 'count', text: 'Сколько голов берём в расчёт?', options: countOptions() },
              { id: 'model', text: 'Какой сценарий сравниваем?', options: [
                { value: 'family', label: 'Семейный бюджет' },
                { value: 'eggs', label: 'Продажа яйца' },
                { value: 'meat', label: 'Продажа мяса' }
              ]}
            ]
          },
          problems: {
            title: 'Проблемы и болезни',
            goal: 'Дать безопасный чек-лист без диагноза',
            questions: [
              { id: 'issue', text: 'Что происходит?', options: [
                { value: 'no_eggs', label: 'Перестали нестись' },
                { value: 'thin_shell', label: 'Тонкая скорлупа' },
                { value: 'low_appetite', label: 'Плохо едят' },
                { value: 'lethargic', label: 'Вялые' },
                { value: 'slow_growth', label: 'Медленно растут' }
              ]},
              { id: 'age', text: 'Какой возраст птицы?', options: [
                { value: 'young', label: 'Молодая птица' },
                { value: 'adult', label: 'Взрослая птица' },
                { value: 'old', label: 'Старшая группа' }
              ]},
              { id: 'change', text: 'Менялись ли корм, свет или температура?', options: [
                { value: 'yes', label: 'Да' },
                { value: 'no', label: 'Нет' },
                { value: 'unknown', label: 'Не уверен' }
              ]}
            ]
          },
          beginner: {
            title: 'Я новичок',
            goal: 'Собрать понятный стартовый план',
            questions: [
              { id: 'result', text: 'Что хотите получить?', options: [
                { value: 'eggs', label: 'Домашние яйца' },
                { value: 'meat', label: 'Мясо для семьи' },
                { value: 'income', label: 'Небольшой заработок' },
                { value: 'mini', label: 'Попробовать мини-ферму' }
              ]},
              { id: 'place', text: 'Где будете содержать?', options: [
                { value: 'dacha', label: 'Дача' },
                { value: 'house', label: 'Частный дом' },
                { value: 'farm', label: 'Деревня/ферма' }
              ]},
              { id: 'size', text: 'С какого масштаба готовы начать?', options: [
                { value: '5_10', label: '5-10 голов' },
                { value: '10_30', label: '10-30 голов' },
                { value: '30_plus', label: 'Больше 30' }
              ]}
            ]
          }
        };

        var state = {
          messages: [],
          scenarioId: null,
          questionIndex: 0,
          answers: {},
          draft: '',
          freeMode: false,
          profile: { birdType: null, count: null, breed: null }
        };

        function birdOptions() {
          return [
            { value: 'chickens', label: 'Куры' },
            { value: 'ducks', label: 'Утки' },
            { value: 'geese', label: 'Гуси' },
            { value: 'turkeys', label: 'Индюки' },
            { value: 'quails', label: 'Перепела' }
          ];
        }

        function countOptions() {
          return [
            { value: 10, label: '10' },
            { value: 20, label: '20' },
            { value: 50, label: '50' },
            { value: 100, label: '100' }
          ];
        }

        function esc(value) {
          return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function fmt(value) {
          return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 1 }).format(value);
        }

        function fmtMoney(value) {
          return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(Math.round(value));
        }

        function currentScenario() {
          return state.scenarioId ? scenarios[state.scenarioId] : null;
        }

        function currentQuestion() {
          var scenario = currentScenario();
          return scenario ? scenario.questions[state.questionIndex] || null : null;
        }

        function resetConversation() {
          state.scenarioId = null;
          state.questionIndex = 0;
          state.answers = {};
          state.freeMode = false;
          state.draft = '';
          state.messages = [
            { role: 'assistant', label: 'Умный птичник', text: 'Здравствуйте! Помогу выбрать птицу, рассчитать хозяйство, подобрать кормление и прикинуть экономику.' },
            { role: 'system', label: 'Как пользоваться', text: '1. Выберите сценарий. 2. Отвечайте плитками. 3. Получите итоговый план и продолжите следующий шаг.' }
          ];
          render();
        }

        function push(role, label, text, recommendation) {
          state.messages.push({ role: role, label: label, text: text, recommendation: recommendation || null });
        }

        function renderPlan(rec) {
          if (!rec) return '';
          return [
            '<div class="plan-card">',
            '<div class="plan-header"><strong>Ваш план</strong><span>' + esc(rec.title) + '</span></div>',
            '<p class="plan-intro">' + esc(rec.summary) + '</p>',
            '<div class="section-list">',
            rec.sections.map(function (s) {
              var content = Array.isArray(s.content)
                ? '<ul>' + s.content.map(function (i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>'
                : '<p>' + esc(s.content) + '</p>';
              return '<section class="plan-section"><strong>' + esc(s.title) + '</strong>' + content + '</section>';
            }).join(''),
            '</div>',
            rec.warning ? '<div class="warning-box">' + esc(rec.warning) + '</div>' : '',
            '</div>'
          ].join('');
        }

        function renderMessages() {
          return state.messages.map(function (m) {
            return '<article class="message ' + esc(m.role) + '">' +
              (m.label ? '<div class="message-label">' + esc(m.label) + '</div>' : '') +
              '<p>' + esc(m.text || '') + '</p>' +
              renderPlan(m.recommendation) +
            '</article>';
          }).join('');
        }

        function renderActions() {
          var q = currentQuestion();
          if (q) {
            return '<div class="action-panel">' +
              '<div class="panel-title"><strong>' + esc(q.text) + '</strong><span>Шаг ' + (state.questionIndex + 1) + ' из ' + currentScenario().questions.length + '</span></div>' +
              '<div class="option-grid">' +
              q.options.map(function (o) {
                return '<button class="quick-button" data-action="answer" data-value="' + esc(String(o.value)) + '">' +
                  '<strong>' + esc(o.label) + '</strong><span>Выбрать этот вариант</span></button>';
              }).join('') +
              '</div></div>';
          }

          if (state.freeMode) {
            return '<div class="action-panel"><div class="panel-title"><strong>Свободный вопрос</strong><span>Можно писать текстом</span></div>' +
              '<button class="ghost-button" data-action="close-free">Вернуться к сценариям</button></div>';
          }

          return '<div class="action-panel">' +
            '<div class="panel-title"><strong>Выберите сценарий</strong><span>Быстрый старт через крупные плашки</span></div>' +
            '<div class="option-grid">' +
            [
              ['choose_poultry', '🐔 Выбрать птицу', 'Подобрать вид птицы и старт'],
              ['calculate_farm', '📐 Рассчитать хозяйство', 'Площадь, выгул, корм и оборудование'],
              ['feeding', '🌾 Подобрать кормление', 'Базовая схема кормления'],
              ['economics', '💰 Прикинуть экономику', 'Затраты, результат и ориентир по окупаемости'],
              ['problems', '🩺 Проблемы и болезни', 'Безопасный чек-лист без диагноза'],
              ['beginner', '👨‍🌾 Я новичок', 'Понятный стартовый план'],
              ['free_question', '✍️ Задать свой вопрос', 'Свободный текстовый вопрос']
            ].map(function (item) {
              return '<button class="quick-button" data-action="scenario" data-scenario="' + item[0] + '">' +
                '<strong>' + esc(item[1]) + '</strong><span>' + esc(item[2]) + '</span></button>';
            }).join('') +
            '</div></div>';
        }

        function renderComposer() {
          return '<div class="composer"><div class="composer-inner">' +
            '<textarea id="composer-input" placeholder="' + esc(state.freeMode ? 'Напишите свой вопрос' : 'Можно уточнить вопрос текстом') + '">' + esc(state.draft) + '</textarea>' +
            '<button class="send-button" data-action="send">Отправить</button>' +
            '</div><div class="composer-hint">' + esc(state.freeMode ? 'Например: что лучше для дачи, куры или перепела?' : 'Основной путь в приложении — через сценарии и короткие шаги.') + '</div></div>';
        }

        function render() {
          var scenario = currentScenario();
          app.innerHTML = [
            '<div class="app-shell">',
            '<aside class="sidebar">',
            '<div class="eyebrow">Демо-версия • Умный птичник</div>',
            '<h1>Умный птичник</h1>',
            '<p class="subtitle">Помощник по домашней птице для спокойного старта</p>',
            '<div class="guide-card"><strong>Как пользоваться</strong><div class="guide-steps">',
            '<div class="guide-step">1. Выберите сценарий: птица, хозяйство, кормление, экономика или старт для новичка.</div>',
            '<div class="guide-step">2. Отвечайте крупными плитками, а текст используйте для уточнений.</div>',
            '<div class="guide-step">3. После плана продолжайте следующий шаг.</div>',
            '</div></div>',
            '<div class="sidebar-note">Информация носит справочный характер. Сервис не ставит диагнозы и не назначает лечение.</div>',
            '</aside>',
            '<section class="chat-shell">',
            '<div class="chat-topbar"><div class="chat-title"><strong>' + esc(scenario ? scenario.title : 'Умный птичник') + '</strong><span>' + esc(scenario ? scenario.goal : 'Короткие сценарии и итоговый план для старта') + '</span></div><button class="reset-button" data-action="reset">Начать заново</button></div>',
            '<div class="messages" id="messages">' + renderMessages() + '</div>',
            renderActions(),
            renderComposer(),
            '</section>',
            '</div>'
          ].join('');

          bindEvents();
          var messages = document.getElementById('messages');
          if (messages) messages.scrollTop = messages.scrollHeight;
        }

        function bindEvents() {
          var input = document.getElementById('composer-input');
          if (input) {
            input.addEventListener('input', function (e) { state.draft = e.target.value; });
            input.addEventListener('keydown', function (e) {
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleText();
              }
            });
          }

          app.querySelectorAll('[data-action]').forEach(function (node) {
            node.addEventListener('click', function () {
              var action = node.getAttribute('data-action');
              if (action === 'reset') return resetConversation();
              if (action === 'scenario') return startScenario(node.getAttribute('data-scenario'));
              if (action === 'answer') return answer(node.getAttribute('data-value'));
              if (action === 'send') return handleText();
              if (action === 'close-free') { state.freeMode = false; render(); }
            });
          });
        }

        function startScenario(id) {
          if (id === 'free_question') {
            state.freeMode = true;
            state.scenarioId = null;
            state.questionIndex = 0;
            state.answers = {};
            push('system', 'Подсказка', 'Напишите вопрос простыми словами, и я отвечу без перегруза.');
            return render();
          }
          state.scenarioId = id;
          state.questionIndex = 0;
          state.answers = {};
          push('assistant', 'Умный птичник', 'Сценарий: ' + scenarios[id].title + '. Пройдём короткий маршрут и соберём понятный план.');
          render();
        }

        function answer(raw) {
          var q = currentQuestion();
          if (!q) return;
          var value = /^\d+$/.test(String(raw)) ? Number(raw) : raw;
          var label = raw;
          q.options.forEach(function (o) { if (String(o.value) === String(raw)) label = o.label; });
          state.answers[q.id] = value;
          if (q.id === 'birdType') state.profile.birdType = value;
          if (q.id === 'count') state.profile.count = value;
          push('user', 'Вы', label);
          state.questionIndex += 1;
          if (currentQuestion()) return render();
          completeScenario();
        }

        function completeScenario() {
          var rec = buildRecommendation(state.scenarioId, state.answers);
          push('assistant', 'Умный птичник', 'Готово. Ниже собрал краткий и практичный план.', rec);
          state.scenarioId = null;
          state.questionIndex = 0;
          state.answers = {};
          render();
        }

        function buildRecommendation(id, a) {
          if (id === 'choose_poultry') return recChoose(a);
          if (id === 'calculate_farm') return recFarm(a);
          if (id === 'feeding') return recFeeding(a);
          if (id === 'economics') return recEconomics(a);
          if (id === 'problems') return recProblems(a);
          if (id === 'beginner') return recBeginner(a);
          return { title: 'План', summary: 'Базовая рекомендация.', sections: [{ title: 'Следующий шаг', content: 'Выберите другой сценарий.' }] };
        }

        function recChoose(a) {
          var id = a.purpose === 'meat' ? 'ducks' : a.purpose === 'sale' && a.experience === 'farmer' ? 'turkeys' : a.warmHousing === 'no' ? 'ducks' : 'chickens';
          var bird = birds[id];
          state.profile.birdType = id;
          return {
            title: 'Рекомендация по выбору птицы',
            summary: 'Для ваших условий лучше начать с понятного и практичного варианта.',
            sections: [
              { title: 'Краткий вывод', content: 'Оптимальный старт для вас: ' + bird.name + '.' },
              { title: 'Рекомендуемый вариант', content: ['Подходящие породы: ' + bird.breeds.join(', ') + '.', 'Сильные стороны: ' + bird.pros.join(', ') + '.'] },
              { title: 'Что подготовить', content: ['Сухое помещение.', 'Поилки и кормушки.', a.warmHousing === 'no' ? 'Продумать тёплое содержание на холодный сезон.' : 'Проверить вентиляцию и защиту от сквозняков.'] },
              { title: 'Частые ошибки', content: ['Покупать птицу до подготовки места.', 'Начинать слишком большим объёмом.', 'Слишком резко менять условия.'] },
              { title: 'Следующий шаг', content: 'Переходите к расчёту хозяйства и кормлению.' }
            ]
          };
        }

        function recFarm(a) {
          var bird = birds[a.birdType || state.profile.birdType || 'chickens'];
          var count = Number(a.count || state.profile.count || 10);
          return {
            title: 'Расчёт мини-хозяйства',
            summary: 'Ниже ориентировочный расчёт по площади, выгулу и корму.',
            sections: [
              { title: 'Краткий вывод', content: 'Для ' + count + ' голов птицы ' + bird.name.toLowerCase() + ' лучше заложить запас по площади и корму.' },
              { title: 'Расчёт / параметры', content: [
                'Площадь помещения: примерно ' + fmt(bird.indoor * count) + ' м².',
                bird.run > 0 ? 'Площадь выгула: примерно ' + fmt(bird.run * count) + ' м².' : 'Выгул не является основным форматом для этого вида.',
                'Корм в день: около ' + fmt((bird.feed * count) / 1000) + ' кг.',
                'Корм в месяц: около ' + fmt(((bird.feed * count) / 1000) * 30) + ' кг.'
              ]},
              { title: 'Что подготовить', content: ['Поилки и кормушки.', 'Подстилку и запас корма.', 'Чистую воду и удобную уборку.'] },
              { title: 'Частые ошибки', content: ['Скученность.', 'Сырость.', 'Отсутствие запаса по корму.'] },
              { title: 'Следующий шаг', content: 'После расчёта переходите к кормлению и экономике.' }
            ]
          };
        }

        function recFeeding(a) {
          var bird = birds[a.birdType || state.profile.birdType || 'chickens'];
          var ageText = a.age === 'chicks' ? 'птенцов' : a.age === 'young' ? 'молодняка' : 'взрослой птицы';
          return {
            title: 'Базовая схема кормления',
            summary: 'Это спокойная стартовая схема без ветеринарных назначений.',
            sections: [
              { title: 'Краткий вывод', content: 'Для ' + bird.name.toLowerCase() + ' важнее всего режим, вода и понятный рацион по возрасту.' },
              { title: 'Основные компоненты рациона', content: [
                'Подобрать базовый корм под возраст ' + ageText + '.',
                a.goal === 'eggs' ? 'Сделать упор на яйценоскость и минеральную поддержку.' : 'Сделать упор на ровный рост и стабильный рацион.',
                'Не допускать сырого и залежавшегося корма.'
              ]},
              { title: 'Частота кормления', content: a.age === 'chicks' ? ['Чаще и небольшими порциями.', 'Следить, чтобы корм не залеживался.'] : ['Стабильный режим каждый день.', 'Не менять график резко без необходимости.'] },
              { title: 'Что должно быть всегда', content: ['Чистая вода.', 'Свежий корм.', 'Минеральная поддержка по базовой схеме.'] },
              { title: 'Частые ошибки', content: ['Резко менять рацион.', 'Кормить без режима.', 'Забывать про чистоту кормушек и поилок.'] },
              { title: 'Следующий шаг', content: 'Сопоставьте рацион с количеством голов и затем прикиньте экономику.' }
            ]
          };
        }

        function recEconomics(a) {
          var id = a.birdType || state.profile.birdType || 'chickens';
          var bird = birds[id];
          var count = Number(a.count || state.profile.count || 10);
          var feedMonth = ((bird.feed * count) / 1000) * 30;
          var start = (count <= 20 ? economics[id].coopSmall : economics[id].coopMedium) + economics[id].equipmentPerBird * count + economics[id].youngBirdCost * count;
          var monthly = economics[id].feedPricePerKg * feedMonth + economics[id].beddingPerBird * count + economics[id].utilities;
          var result = a.model === 'meat'
            ? economics[id].meatRevenuePerBird * count - monthly * economics[id].meatCycleMonths
            : (economics[id].eggPrice * Math.max(economics[id].eggsPerBirdMonthly, 12) * count) - monthly;
          return {
            title: 'Упрощённая экономика',
            summary: 'Это грубая оценка, чтобы сравнить стартовые затраты и ежемесячную нагрузку.',
            sections: [
              { title: 'Краткий вывод', content: 'Для ' + bird.name.toLowerCase() + ' на ' + count + ' голов важно отдельно смотреть стартовые вложения и ежемесячные расходы.' },
              { title: 'Расходы', content: ['Стартовые вложения: около ' + fmtMoney(start) + '.', 'Ежемесячные расходы: около ' + fmtMoney(monthly) + '.', 'Корм в месяц: примерно ' + fmt(feedMonth) + ' кг.'] },
              { title: 'Доходы / экономия', content: result > 0 ? 'Ориентировочный результат: около ' + fmtMoney(result) + '.' : 'При этих вводных проект выглядит напряжённым по экономике.' },
              { title: 'Точка безубыточности', content: result > 0 ? 'Вложения могут отбиваться примерно за ' + fmt(start / result) + ' мес.' : 'Лучше уменьшить старт или пересмотреть модель.' },
              { title: 'Что подготовить', content: ['Запас корма на первый месяц.', 'Небольшой резерв на непредвиденные расходы.', 'Сравнение семейного и продажного сценария.'] },
              { title: 'Следующий шаг', content: 'Сверьте экономику с расчётом хозяйства и схемой кормления.' }
            ]
          };
        }

        function recProblems(a) {
          return {
            title: 'Чек-лист первичной проверки',
            summary: 'Ниже только безопасный бытовой чек-лист. Это не диагноз и не назначение лечения.',
            sections: [
              { title: 'Возможные бытовые причины', content: ['Корм и вода.', 'Световой режим.', 'Температура и сырость.', 'Скученность или стресс.'] },
              { title: 'Что проверить в первую очередь', content: ['Свежесть воды и корма.', 'Температуру и свет.', 'Чистоту подстилки, кормушек и поилок.', 'Нет ли сквозняков и сырости.'] },
              { title: 'Когда срочно обращаться к ветеринару', content: ['Есть падёж.', 'Птица отказывается от воды.', 'Вялость выраженная и не проходит.', 'Есть подозрение на инфекцию.'] },
              { title: 'Что не стоит делать самостоятельно', content: ['Не назначать лекарства наугад.', 'Не давать дозировки без специалиста.', 'Не считать это диагнозом по одному симптому.'] }
            ],
            warning: 'Это не диагноз и не назначение лечения. При ухудшении состояния обратитесь к ветеринарному специалисту.'
          };
        }

        function recBeginner(a) {
          var id = a.result === 'meat' ? 'ducks' : a.result === 'mini' ? 'quails' : 'chickens';
          return {
            title: 'План запуска для новичка',
            summary: 'Ниже самый спокойный старт, чтобы войти в птицеводство без перегруза.',
            sections: [
              { title: 'Рекомендуемый старт', content: 'Лучше начать с варианта ' + birds[id].name + ' и небольшого масштаба.' },
              { title: 'План подготовки на 30 дней', content: ['Неделя 1: выбрать птицу, место и масштаб.', 'Неделя 2: подготовить помещение, поилки и кормушки.', 'Неделя 3: закупить стартовый корм и проверить воду, свет и подстилку.', 'Неделя 4: завести первую птицу и держать спокойный режим наблюдения.'] },
              { title: 'Минимальный список покупок', content: ['Поилки и кормушки.', 'Подстилка и запас корма.', 'Инвентарь для уборки.', 'Освещение и защита от сырости.'] },
              { title: 'Ошибки новичков', content: ['Начинать слишком большим объёмом.', 'Покупать птицу до подготовки помещения.', 'Слишком резко менять условия и рацион.'] },
              { title: 'Следующий шаг', content: 'Переходите к выбору птицы или расчёту хозяйства.' }
            ]
          };
        }

        function handleText() {
          var text = String(state.draft || '').trim();
          if (!text) return;
          push('user', 'Вы', text);
          state.draft = '';
          if (state.freeMode) {
            var low = text.toLowerCase();
            if (/(бол|симптом|вял|не ест|не пьет|скорлуп|нес)/.test(low)) {
              push('assistant', 'Умный птичник', 'Это не диагноз и не назначение лечения. Проверьте воду, корм, свет, температуру, чистоту и при ухудшении состояния обратитесь к ветеринарному специалисту.');
            } else if (low.indexOf('куры') !== -1 || low.indexOf('переп') !== -1) {
              push('assistant', 'Умный птичник', 'Для спокойного старта чаще всего выбирают кур-несушек, а перепела хороши, если места мало и нужен компактный проект.');
            } else {
              push('assistant', 'Умный птичник', 'Могу помочь по выбору птицы, условиям содержания, кормлению, базовой экономике и безопасной первичной проверке частых проблем.');
            }
          } else {
            push('assistant', 'Умный птичник', 'Если хотите идти по шагам, выберите сценарий плиткой ниже. Если вопрос про симптомы, я дам только безопасный чек-лист без диагноза и лекарств.');
          }
          render();
        }

        resetConversation();
      })();
    </script>
  </body>
</html>
