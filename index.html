<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Умный птичник</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-3" />
  </head>
  <body>
    <div id="app">
      <div style="max-width: 960px; margin: 40px auto; padding: 24px; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; color: #283126;">
        <h1 style="margin: 0 0 12px; font-size: 34px;">Умный птичник</h1>
        <p id="boot-status" style="margin: 0; line-height: 1.6;">
          Загружаю интерфейс. Если экран останется пустым, обновите страницу или выполните новый деплой с обновлённым стартовым файлом.
        </p>
      </div>
    </div>
    <script>
      (function () {
        var statusNode = document.getElementById("boot-status");
        function setStatus(text) {
          if (statusNode) {
            statusNode.textContent = text;
          }
        }

        setStatus("Подключаю приложение...");

        var script = document.createElement("script");
        script.src = "./app.js?v=20260607-3";
        script.defer = true;
        script.onload = function () {
          setStatus("Приложение загружено.");
        };
        script.onerror = function () {
          setStatus("Не удалось загрузить файл app.js. Обычно это значит, что Netlify опубликовал старую версию или не подтянул обновлённый скрипт.");
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
