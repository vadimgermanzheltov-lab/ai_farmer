<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Умный птичник</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-4" />
  </head>
  <body>
    <div id="app">
      <div style="max-width: 960px; margin: 40px auto; padding: 24px; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; color: #283126;">
        <h1 style="margin: 0 0 12px; font-size: 34px;">Умный птичник</h1>
        <p style="margin: 0; line-height: 1.6;">Загружаю интерфейс...</p>
      </div>
    </div>

    <script>
      (function () {
        var app = document.getElementById("app");
        if (!app) {
          return;
        }

        var dataStore = {
          appConfig: {
            appName: "Умный птичник",
            subtitle: "Помощник по домашней птице для спокойного старта",
            welcomeMessage:
              "Здравствуйте! Помогу выбрать птицу, рассчитать хозяйство, подобрать кормление и прикинуть упрощённую экономику.",
            disclaimer:
              "Информация носит справочный характер. Сервис не ставит диагнозы, не назначает лечение и не заменяет ветеринарного специалиста.",
            startButtons: [
              { id: "choose_poultry", label: "Выбрать птицу", emoji: "🐔" },
              { id: "calculate_farm", label: "Рассчитать хозяйство", emoji: "📐" },
              { id: "feeding", label: "Подобрать кормление", emoji: "🌾" },
              { id: "economics", label: "Прикинуть экономику", emoji: "💰" },
              { id: "problems", label: "Проблемы и болезни", emoji: "🩺" },
              { id: "beginner", label: "Я новичок", emoji: "👨‍🌾" },
              { id: "free_question", label: "Задать свой вопрос", emoji: "✍️" }
            ]
          },
          scenarios: {},
          poultryCatalog: {},
          housingNorms: {},
          visualAssets: { poultryImages: {}, housingImages: {} },
          recommendationTemplates: {},
          safetyRules: {
            safeHealthResponse:
              "Это не диагноз и не назначение лечения. Проверьте воду, корм, свет, температуру, чистоту и при ухудшении состояния обратитесь к ветеринарному специалисту."
          }
        };

        var economics = {
          chickens: { youngBirdCost: 420, feedPricePerKg: 34, eggPrice: 12, eggsPerBirdMonthly: 22, meatRevenuePerBird: 950, meatCycleMonths: 2.5, coopSmall: 18000, coopMedium: 42000, equipmentPerBird: 220, beddingPerBird: 35, utilities: 900 },
          ducks: { youngBirdCost: 520, feedPricePerKg: 32, eggPrice: 13, eggsPerBirdMonthly: 16, meatRevenuePerBird: 1500, meatCycleMonths: 3, coopSmall: 22000, coopMedium: 48000, equipmentPerBird: 240, beddingPerBird: 45, utilities: 1000 },
          geese: { youngBirdCost: 700, feedPricePerKg: 30, eggPrice: 0, eggsPerBirdMonthly: 0, meatRevenuePerBird: 2600, meatCycleMonths: 4, coopSmall: 26000, coopMedium: 56000, equipmentPerBird: 300, beddingPerBird: 55, utilities: 1200 },
          turkeys: { youngBirdCost: 750, feedPricePerKg: 36, eggPrice: 0, eggsPerBirdMonthly: 0, meatRevenuePerBird: 3200, meatCycleMonths: 4.5, coopSmall: 30000, coopMedium: 62000, equipmentPerBird: 340, beddingPerBird: 60, utilities: 1400 },
          quails: { youngBirdCost: 180, feedPricePerKg: 48, eggPrice: 6, eggsPerBirdMonthly: 24, meatRevenuePerBird: 280, meatCycleMonths: 2, coopSmall: 12000, coopMedium: 26000, equipmentPerBird: 160, beddingPerBird: 18, utilities: 700 }
        };

        var state = {
          messages: [],
          scenarioId: null,
          questionIndex: 0,
          answers: {},
          freeMode: false,
          draft: "",
          pending: null,
          profile: {
            birdType: null,
            breed: null,
            count: null,
            purpose: null,
            economyModel: null
          }
        };

        function escapeHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function round1(value) {
          return Math.round(value * 10) / 10;
        }

        function formatNumber(value) {
          return new Intl.NumberFormat("ru-RU", { maximumFractionDigits: 1 }).format(value);
        }

        function formatCurrency(value) {
          return new Intl.NumberFormat("ru-RU", {
            style: "currency",
            currency: "RUB",
            maximumFractionDigits: 0
          }).format(Math.round(value));
        }

        function normalizeImage(path) {
          if (!path) {
            return "";
          }
          if (path.indexOf("/public/") === 0) {
            return path.replace("/public", "");
          }
          return path;
        }

        function getScenario() {
          return state.scenarioId ? dataStore.scenarios[state.scenarioId] : null;
        }

        function getQuestion() {
          var scenario = getScenario();
          if (!scenario || !scenario.questions) {
            return null;
          }
          return scenario.questions[state.questionIndex] || null;
        }

        function pushMessage(role, label, text, recommendation, visuals) {
          state.messages.push({
            role: role,
            label: label,
            text: text,
            recommendation: recommendation || null,
            visuals: visuals || null
          });
        }

        function resetConversation() {
          state.scenarioId = null;
          state.questionIndex = 0;
          state.answers = {};
          state.freeMode = false;
          state.pending = null;
          state.draft = "";
          state.messages = [
            {
              role: "assistant",
              label: dataStore.appConfig.appName,
              text: dataStore.appConfig.welcomeMessage
            },
            {
              role: "system",
              label: "Как пользоваться",
              text: "1. Выберите сценарий плиткой ниже. 2. Отвечайте в основном кнопками. 3. Получите план и продолжайте маршрут дальше."
            }
          ];
          render();
        }

        function renderSidebar() {
          return [
            '<aside class="sidebar">',
            '<div class="eyebrow">Демо-версия • ' + escapeHtml(dataStore.appConfig.appName) + "</div>",
            "<h1>" + escapeHtml(dataStore.appConfig.appName) + "</h1>",
            '<p class="subtitle">' + escapeHtml(dataStore.appConfig.subtitle || "") + "</p>",
            '<div class="guide-card">',
            "<strong>Как пользоваться</strong>",
            '<div class="guide-steps">',
            '<div class="guide-step">1. Выберите сценарий: птица, хозяйство, кормление, экономика или старт для новичка.</div>',
            '<div class="guide-step">2. Отвечайте крупными плитками, а текст используйте для уточнений.</div>',
            '<div class="guide-step">3. После плана можно продолжить маршрут по следующим шагам.</div>',
            "</div>",
            "</div>",
            '<div class="sidebar-note">' + escapeHtml(dataStore.appConfig.disclaimer || "") + "</div>",
            "</aside>"
          ].join("");
        }

        function renderVisuals(items) {
          if (!items || !items.length) {
            return "";
          }

          return [
            '<div class="visual-grid compact">',
            items.slice(0, 3).map(function (item) {
              return [
                '<article class="visual-card">',
                '<img src="' + escapeHtml(normalizeImage(item.imageUrl)) + '" alt="' + escapeHtml(item.alt || item.title) + '" />',
                '<div class="visual-fallback">' + escapeHtml(item.title || "Иллюстрация") + "</div>",
                '<div class="visual-body">',
                "<strong>" + escapeHtml(item.title || "") + "</strong>",
                "<p>" + escapeHtml(item.description || "Подходящая иллюстрация для этого шага.") + "</p>",
                "</div>",
                "</article>"
              ].join("");
            }).join(""),
            "</div>"
          ].join("");
        }

        function renderPlan(recommendation) {
          if (!recommendation) {
            return "";
          }

          return [
            '<div class="plan-card">',
            '<div class="plan-header"><strong>Ваш план</strong><span>' + escapeHtml(recommendation.title) + "</span></div>",
            '<p class="plan-intro">' + escapeHtml(recommendation.summary) + "</p>",
            '<div class="section-list">',
            recommendation.sections.map(function (section) {
              var content = Array.isArray(section.content)
                ? "<ul>" + section.content.map(function (item) { return "<li>" + escapeHtml(item) + "</li>"; }).join("") + "</ul>"
                : "<p>" + escapeHtml(section.content) + "</p>";

              return '<section class="plan-section"><strong>' + escapeHtml(section.title) + "</strong>" + content + "</section>";
            }).join(""),
            "</div>",
            recommendation.warning ? '<div class="warning-box">' + escapeHtml(recommendation.warning) + "</div>" : "",
            renderVisuals(recommendation.visuals || []),
            recommendation.followUps && recommendation.followUps.length ? [
              '<div class="followup-block">',
              '<div class="followup-title">Продолжить диалог</div>',
              '<div class="option-grid">',
              recommendation.followUps.map(function (item) {
                return '<button class="quick-button followup-button" data-action="follow-up" data-follow-up="' + escapeHtml(item.action) + '"><strong>' + escapeHtml(item.title) + "</strong><span>" + escapeHtml(item.description) + "</span></button>";
              }).join(""),
              "</div>",
              "</div>"
            ].join("") : "",
            "</div>"
          ].join("");
        }

        function renderMessages() {
          return state.messages.map(function (message) {
            return [
              '<article class="message ' + escapeHtml(message.role) + '">',
              message.label ? '<div class="message-label">' + escapeHtml(message.label) + "</div>" : "",
              "<p>" + escapeHtml(message.text || "") + "</p>",
              renderPlan(message.recommendation),
              renderVisuals(message.visuals),
              "</article>"
            ].join("");
          }).join("");
        }

        function renderActionPanel() {
          var question = getQuestion();

          if (state.pending) {
            return [
              '<div class="action-panel">',
              '<div class="panel-title"><strong>' + escapeHtml(state.pending.title) + "</strong><span>" + escapeHtml(state.pending.subtitle || "Выберите следующий шаг") + "</span></div>",
              '<div class="option-grid">',
              state.pending.options.map(function (item) {
                return '<button class="quick-button" data-action="pending-option" data-value="' + escapeHtml(String(item.value)) + '"><strong>' + escapeHtml(item.label) + "</strong><span>" + escapeHtml(item.description || "Выбрать") + "</span></button>";
              }).join(""),
              "</div>",
              "</div>"
            ].join("");
          }

          if (question) {
            return [
              '<div class="action-panel">',
              '<div class="panel-title"><strong>' + escapeHtml(question.text) + "</strong><span>Шаг " + (state.questionIndex + 1) + " из " + getScenario().questions.length + "</span></div>",
              '<div class="option-grid">',
              question.options.map(function (option) {
                return '<button class="quick-button" data-action="answer-option" data-value="' + escapeHtml(String(option.value)) + '"><strong>' + escapeHtml(option.label) + "</strong><span>Выбрать этот вариант</span></button>";
              }).join(""),
              "</div>",
              question.type === "buttons_with_custom"
                ? '<div class="custom-answer"><input id="custom-count-input" type="number" min="1" step="1" placeholder="Свое количество голов" /><button class="custom-submit" data-action="custom-count">Сохранить число</button></div>'
                : "",
              "</div>"
            ].join("");
          }

          if (state.freeMode) {
            return [
              '<div class="action-panel">',
              '<div class="panel-title"><strong>Свободный вопрос</strong><span>Можно писать обычным текстом</span></div>',
              '<button class="ghost-button" data-action="close-free-mode">Вернуться к сценариям</button>',
              "</div>"
            ].join("");
          }

          return [
            '<div class="action-panel">',
            '<div class="panel-title"><strong>Выберите сценарий</strong><span>Быстрый старт через крупные плитки</span></div>',
            '<div class="option-grid">',
            (dataStore.appConfig.startButtons || []).map(function (button) {
              return '<button class="quick-button" data-action="start-scenario" data-scenario="' + escapeHtml(button.id) + '"><strong>' + escapeHtml((button.emoji ? button.emoji + " " : "") + button.label) + "</strong><span>" + escapeHtml(describeStartButton(button.id)) + "</span></button>";
            }).join(""),
            "</div>",
            "</div>"
          ].join("");
        }

        function renderComposer() {
          return [
            '<div class="composer">',
            '<div class="composer-inner">',
            '<textarea id="composer-input" placeholder="' + escapeHtml(state.freeMode ? "Напишите свой вопрос" : "Можно уточнить вопрос текстом") + '">' + escapeHtml(state.draft) + "</textarea>",
            '<button class="send-button" data-action="send-text">Отправить</button>',
            "</div>",
            '<div class="composer-hint">' + escapeHtml(state.freeMode ? "Например: что лучше для дачи, куры или перепела?" : "Основной путь в приложении — через сценарии и кнопки.") + "</div>",
            "</div>"
          ].join("");
        }

        function render() {
          var scenario = getScenario();
          app.innerHTML = [
            '<div class="app-shell">',
            renderSidebar(),
            '<section class="chat-shell">',
            '<div class="chat-topbar">',
            '<div class="chat-title">',
            "<strong>" + escapeHtml(scenario ? scenario.title : dataStore.appConfig.appName) + "</strong>",
            "<span>" + escapeHtml(scenario ? scenario.goal : "Короткие сценарии, связанные шаги и понятный итоговый план") + "</span>",
            "</div>",
            '<button class="reset-button" data-action="reset">Начать заново</button>',
            "</div>",
            '<div class="messages" id="messages">' + renderMessages() + "</div>",
            renderActionPanel(),
            renderComposer(),
            "</section>",
            "</div>"
          ].join("");

          bindEvents();
          wireImages();

          var messages = document.getElementById("messages");
          if (messages) {
            messages.scrollTop = messages.scrollHeight;
          }
        }

        function bindEvents() {
          var composer = document.getElementById("composer-input");
          if (composer) {
            composer.addEventListener("input", function (event) {
              state.draft = event.target.value;
            });
            composer.addEventListener("keydown", function (event) {
              if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                handleText();
              }
            });
          }

          app.querySelectorAll("[data-action]").forEach(function (node) {
            node.addEventListener("click", function () {
              var action = node.getAttribute("data-action");
              if (action === "reset") {
                resetConversation();
                return;
              }
              if (action === "start-scenario") {
                startScenario(node.getAttribute("data-scenario"));
                return;
              }
              if (action === "answer-option") {
                answerQuestion(node.getAttribute("data-value"));
                return;
              }
              if (action === "custom-count") {
                submitCustomCount();
                return;
              }
              if (action === "send-text") {
                handleText();
                return;
              }
              if (action === "close-free-mode") {
                state.freeMode = false;
                render();
                return;
              }
              if (action === "follow-up") {
                followUp(node.getAttribute("data-follow-up"));
                return;
              }
              if (action === "pending-option") {
                handlePending(node.getAttribute("data-value"));
              }
            });
          });
        }

        function wireImages() {
          app.querySelectorAll(".visual-card img").forEach(function (img) {
            img.addEventListener("error", function () {
              var card = img.closest(".visual-card");
              if (card) {
                card.classList.add("is-broken");
              }
            }, { once: true });
          });
        }

        function describeStartButton(id) {
          return {
            choose_poultry: "Подберу птицу, породы и базовый старт.",
            calculate_farm: "Посчитаю площадь, выгул, корм и оборудование.",
            feeding: "Соберу простую схему кормления.",
            economics: "Сравню расходы, результат и ориентир по окупаемости.",
            problems: "Дам безопасный чек-лист первичной проверки.",
            beginner: "Соберу понятный план для новичка.",
            free_question: "Можно спросить свободным текстом."
          }[id] || "Выберите подходящий сценарий.";
        }

        function startScenario(id) {
          if (id === "free_question") {
            state.freeMode = true;
            state.scenarioId = null;
            state.questionIndex = 0;
            state.answers = {};
            state.pending = null;
            pushMessage("system", "Подсказка", "Напишите вопрос простыми словами, и я отвечу без перегруза.");
            render();
            return;
          }

          if (!dataStore.scenarios[id]) {
            pushMessage("system", "Подсказка", "Сценарий пока недоступен.");
            render();
            return;
          }

          state.scenarioId = id;
          state.questionIndex = 0;
          state.answers = {};
          state.pending = null;
          state.freeMode = false;

          if ((id === "calculate_farm" || id === "feeding" || id === "economics") && state.profile.birdType) {
            state.answers.birdType = state.profile.birdType;
            state.questionIndex = 1;
          }
          if ((id === "calculate_farm" || id === "economics") && state.profile.count && state.questionIndex === 1) {
            state.answers.count = state.profile.count;
            state.questionIndex = 2;
          }

          pushMessage("assistant", dataStore.appConfig.appName, "Сценарий: " + dataStore.scenarios[id].title + ". Пройдём короткий маршрут и соберём понятный план.");
          render();
        }

        function answerQuestion(rawValue) {
          var question = getQuestion();
          if (!question) {
            return;
          }

          if (rawValue === "custom") {
            pushMessage("system", "Подсказка", "Введите своё количество голов в поле ниже и сохраните число.");
            render();
            return;
          }

          var value = /^\d+$/.test(String(rawValue)) ? Number(rawValue) : rawValue;
          var label = rawValue;
          question.options.forEach(function (option) {
            if (String(option.value) === String(rawValue)) {
              label = option.label;
            }
          });

          state.answers[question.id] = value;
          rememberProfile(question.id, value);
          pushMessage("user", "Вы", label);

          state.questionIndex += 1;
          if (getQuestion()) {
            render();
            return;
          }

          completeScenario();
        }

        function submitCustomCount() {
          var input = document.getElementById("custom-count-input");
          var value = Number(input && input.value);
          if (!Number.isFinite(value) || value <= 0) {
            pushMessage("system", "Подсказка", "Введите целое положительное число, например 37.");
            render();
            return;
          }
          answerQuestion(String(value));
        }

        function rememberProfile(id, value) {
          if (id === "birdType") {
            state.profile.birdType = value;
          }
          if (id === "count") {
            state.profile.count = Number(value);
          }
          if (id === "purpose") {
            state.profile.purpose = value;
          }
          if (id === "economyModel") {
            state.profile.economyModel = value;
          }
        }

        function completeScenario() {
          var recommendation = buildRecommendation(state.scenarioId, state.answers);
          pushMessage("assistant", dataStore.appConfig.appName, "Готово. Ниже собрал краткий и практичный план.", recommendation, null);
          state.scenarioId = null;
          state.questionIndex = 0;
          state.answers = {};
          render();
        }

        function buildRecommendation(id, answers) {
          if (id === "choose_poultry") {
            return buildChoosePoultry(answers);
          }
          if (id === "calculate_farm") {
            return buildFarm(answers);
          }
          if (id === "feeding") {
            return buildFeeding(answers);
          }
          if (id === "economics") {
            return buildEconomics(answers);
          }
          if (id === "problems") {
            return buildProblems(answers);
          }
          if (id === "beginner") {
            return buildBeginner(answers);
          }
          return {
            title: "План",
            summary: "Собрал базовую рекомендацию.",
            sections: [{ title: "Следующий шаг", content: "Выберите другой сценарий и продолжите расчёт." }]
          };
        }

        function chooseBird(answers) {
          if (answers.purpose === "eggs") {
            return answers.experience === "beginner" ? "chickens" : "quails";
          }
          if (answers.purpose === "meat") {
            return answers.countRange === "up_to_10" ? "ducks" : "chickens";
          }
          if (answers.purpose === "sale") {
            return answers.experience === "farmer" ? "turkeys" : "chickens";
          }
          if (answers.warmHousing === "no") {
            return "ducks";
          }
          return "chickens";
        }

        function mapBreedKey(value) {
          return {
            eggs: "eggs",
            meat: "meat",
            universal: "universal",
            sale: "universal"
          }[value] || "universal";
        }

        function birdVisual(id) {
          return dataStore.visualAssets.poultryImages && dataStore.visualAssets.poultryImages[id]
            ? dataStore.visualAssets.poultryImages[id]
            : null;
        }

        function housingVisual(id) {
          return dataStore.visualAssets.housingImages && dataStore.visualAssets.housingImages[id]
            ? dataStore.visualAssets.housingImages[id]
            : null;
        }

        function buildChoosePoultry(answers) {
          var birdId = chooseBird(answers);
          var bird = dataStore.poultryCatalog[birdId];
          var breedKey = mapBreedKey(answers.purpose);
          var breeds = bird && bird.recommendedBreeds ? (bird.recommendedBreeds[breedKey] || bird.recommendedBreeds.universal || bird.recommendedBreeds.eggs || bird.recommendedBreeds.meat || []) : [];
          state.profile.birdType = birdId;
          state.profile.purpose = answers.purpose;

          return {
            title: "Рекомендация по выбору птицы",
            summary: "Для ваших условий лучше взять вариант, который проще в уходе и понятнее по старту.",
            sections: [
              { title: "Краткий вывод", content: "Оптимальный старт для вас: " + (bird ? bird.name : "куры") + "." },
              { title: "Рекомендуемый вариант", content: breeds.length ? ["Подходящие породы: " + breeds.join(", "), "Сложность старта: " + (bird ? bird.difficulty : "низкая") + "."] : ["Подходящий вариант: " + (bird ? bird.name : "куры") + "."] },
              { title: "Почему подходит", content: bird && bird.pros ? bird.pros.slice(0, 3) : ["Простой старт.", "Понятный уход.", "Быстрый практический результат."] },
              { title: "Что подготовить", content: ["Сухое помещение.", "Поилки и кормушки.", answers.warmHousing === "no" ? "Продумать тёплое содержание на холодный сезон." : "Проверить вентиляцию и защиту от сквозняков."] },
              { title: "Частые ошибки", content: bird && bird.cons ? bird.cons.slice(0, 3) : ["Покупать птицу до подготовки места.", "Начинать слишком большим объёмом.", "Менять условия слишком резко."] },
              { title: "Следующий шаг", content: "Выберите породу и переходите к расчёту хозяйства." }
            ],
            visuals: birdVisual(birdId) ? [birdVisual(birdId)] : [],
            followUps: [
              { action: "choose_breeds", title: "Выбрать породы", description: "Сохранить подходящую породу." },
              { action: "calculate_farm", title: "Рассчитать хозяйство", description: "Прикинуть площадь, выгул и корм." },
              { action: "feeding", title: "Подобрать кормление", description: "Собрать базовую схему кормления." },
              { action: "economics", title: "Прикинуть экономику", description: "Сравнить расходы и результат." }
            ]
          };
        }

        function buildFarm(answers) {
          var birdId = answers.birdType || state.profile.birdType || "chickens";
          var count = Number(answers.count || state.profile.count || 10);
          var bird = dataStore.poultryCatalog[birdId] || { name: "Куры" };
          var norms = dataStore.housingNorms[birdId] || {};
          var indoor = round1((norms.indoorAreaM2PerBird || 0.35) * count);
          var outdoor = round1((norms.runAreaM2PerBird || 1.2) * count);
          var feedDay = round1(((norms.feedGramsPerDayPerBird || 120) * count) / 1000);
          var feedMonth = round1(feedDay * 30);
          var nests = norms.nestsPerBirds ? Math.max(1, Math.ceil(count / norms.nestsPerBirds)) : null;
          var roost = norms.roostCmPerBird ? Math.ceil((norms.roostCmPerBird * count) / 100) : null;

          state.profile.birdType = birdId;
          state.profile.count = count;

          return {
            title: "Расчёт мини-хозяйства",
            summary: "Ниже ориентировочный расчёт по площади, корму и базовому оборудованию.",
            sections: [
              { title: "Краткий вывод", content: "Для " + count + " голов птицы " + bird.name.toLowerCase() + " лучше сразу заложить небольшой запас по площади." },
              {
                title: "Расчёт / параметры",
                content: [
                  "Площадь помещения: примерно " + formatNumber(indoor) + " м².",
                  outdoor > 0 ? "Площадь выгула: примерно " + formatNumber(outdoor) + " м²." : "Выгул для этого вида обычно не является основным форматом.",
                  "Корм в день: около " + formatNumber(feedDay) + " кг.",
                  "Корм в месяц: около " + formatNumber(feedMonth) + " кг."
                ].concat(nests ? ["Гнёзда: примерно " + nests + "."] : [], roost ? ["Насесты: примерно " + roost + " пог. м."] : [])
              },
              { title: "Что подготовить", content: ["Поилки и кормушки.", "Подстилку и запас корма.", norms.water ? "Постоянный доступ к воде: " + norms.water + "." : "Постоянный доступ к чистой воде."] },
              { title: "Частые ошибки", content: norms.notes ? norms.notes.slice(0, 3) : ["Скученность.", "Сырость.", "Отсутствие запаса по корму."] },
              { title: "Следующий шаг", content: "После расчёта переходите к кормлению и экономике." }
            ],
            visuals: [housingVisual("small_coop"), housingVisual("walk_area"), housingVisual("feeders")].filter(Boolean),
            followUps: [
              { action: "feeding", title: "Подобрать кормление", description: "Собрать рацион под ваш масштаб." },
              { action: "economics", title: "Прикинуть экономику", description: "Посчитать базовые расходы." }
            ]
          };
        }

        function buildFeeding(answers) {
          var birdId = answers.birdType || state.profile.birdType || "chickens";
          var bird = dataStore.poultryCatalog[birdId] || { name: "Птица" };
          var age = answers.age;
          var goal = answers.feedingGoal;
          var components = age === "chicks"
            ? ["Стартовый корм по возрасту.", "Небольшие порции без залеживания.", "Постоянная чистая вода."]
            : age === "young"
              ? ["Корм для активного роста.", goal === "meat" ? "Акцент на набор массы." : "Ровный рацион без резких скачков.", "Минеральная поддержка по базовой схеме."]
              : [goal === "eggs" ? "Рацион с упором на яйценоскость и кальций." : "Базовый полноценный рацион для взрослой птицы.", "Зерновая и комбикормовая часть без перекорма.", "Постоянный доступ к воде."];

          return {
            title: "Базовая схема кормления",
            summary: "Это спокойная стартовая схема без ветеринарных назначений.",
            sections: [
              { title: "Краткий вывод", content: "Для " + bird.name.toLowerCase() + " важнее всего стабильный режим, вода и понятный рацион по возрасту." },
              { title: "Основные компоненты рациона", content: components },
              { title: "Частота кормления", content: age === "chicks" ? ["Чаще и небольшими порциями.", "Следить, чтобы корм не залеживался."] : ["Стабильный режим каждый день.", "Не менять график резко без необходимости."] },
              { title: "Что обязательно должно быть всегда", content: ["Чистая вода.", "Свежий корм.", goal === "eggs" ? "Источник кальция и минеральной поддержки." : "Минеральная поддержка по базовой схеме."] },
              { title: "Частые ошибки", content: ["Резко менять рацион.", "Кормить без режима.", "Забывать про воду и чистоту кормушек."] },
              { title: "Следующий шаг", content: "Сопоставьте рацион с количеством голов и затем прикиньте экономику." }
            ],
            followUps: [
              { action: "calculate_farm", title: "Рассчитать хозяйство", description: "Сверить корм с количеством голов." },
              { action: "economics", title: "Прикинуть экономику", description: "Посчитать нагрузку на корм." }
            ]
          };
        }

        function buildEconomics(answers) {
          var birdId = answers.birdType || state.profile.birdType || "chickens";
          var count = Number(answers.count || state.profile.count || 10);
          var model = answers.economyModel || state.profile.economyModel || "family_budget";
          var bird = dataStore.poultryCatalog[birdId] || { name: "Куры" };
          var norms = dataStore.housingNorms[birdId] || {};
          var eco = economics[birdId] || economics.chickens;
          var feedMonth = round1((((norms.feedGramsPerDayPerBird || 120) * count) / 1000) * 30);
          var startup = (count <= 20 ? eco.coopSmall : eco.coopMedium) + eco.equipmentPerBird * count + eco.youngBirdCost * count;
          var monthly = eco.feedPricePerKg * feedMonth + eco.beddingPerBird * count + eco.utilities;
          var result = 0;
          var resultText = "";

          if (model === "eggs_sale") {
            result = eco.eggPrice * eco.eggsPerBirdMonthly * count - monthly;
            resultText = "При продаже яйца ориентировочный ежемесячный результат может быть около " + formatCurrency(result) + ".";
          } else if (model === "meat_sale") {
            result = eco.meatRevenuePerBird * count - monthly * eco.meatCycleMonths;
            resultText = "За один цикл выращивания ориентировочный результат может быть около " + formatCurrency(result) + ".";
          } else {
            result = eco.eggPrice * Math.max(eco.eggsPerBirdMonthly, 12) * count - monthly;
            resultText = "Как семейная модель это даёт ориентир по экономии или частичному возврату расходов около " + formatCurrency(result) + " в месяц.";
          }

          state.profile.birdType = birdId;
          state.profile.count = count;
          state.profile.economyModel = model;

          return {
            title: "Упрощённая экономика",
            summary: "Это грубая оценка для старта, чтобы сравнить расходы, доходы и ориентир по безубыточности.",
            sections: [
              { title: "Краткий вывод", content: "Для " + bird.name.toLowerCase() + " на " + count + " голов важно отдельно смотреть стартовые вложения и ежемесячную нагрузку." },
              { title: "Расходы", content: ["Стартовые вложения: около " + formatCurrency(startup) + ".", "Ежемесячные расходы: около " + formatCurrency(monthly) + ".", "Корм в месяц: примерно " + formatNumber(feedMonth) + " кг."] },
              { title: "Доходы / экономия", content: resultText },
              { title: "Точка безубыточности", content: result > 0 ? "При таком ориентире вложения могут отбиваться примерно за " + formatNumber(startup / result) + " мес." : "При этих вводных проект выглядит напряжённым по экономике, лучше уменьшить старт или пересмотреть модель." },
              { title: "Что подготовить", content: ["Сделать запас по корму на первый месяц.", "Сразу заложить мелкие непредвиденные расходы.", "Сравнить семейный и продажный сценарий."] },
              { title: "Следующий шаг", content: "Сверьте расчёт с реальной площадью и затем вернитесь к содержанию и кормлению." }
            ],
            followUps: [
              { action: "calculate_farm", title: "Рассчитать хозяйство", description: "Сверить экономику с площадью и выгулом." },
              { action: "feeding", title: "Подобрать кормление", description: "Проверить нагрузку на корм." }
            ]
          };
        }

        function buildProblems(answers) {
          var reasons = [];
          if (answers.problemType === "no_eggs") {
            reasons = ["световой режим", "стресс", "смена корма", "возраст птицы"];
          } else if (answers.problemType === "thin_shell") {
            reasons = ["нехватка кальция", "перекос по рациону", "стресс"];
          } else if (answers.problemType === "low_appetite") {
            reasons = ["испорченный корм", "грязная вода", "жара или холод"];
          } else if (answers.problemType === "lethargic") {
            reasons = ["перегрев", "скученность", "сырость", "общее ухудшение условий"];
          } else if (answers.problemType === "slow_growth") {
            reasons = ["слабый рацион", "мало места", "неподходящий режим содержания"];
          } else {
            reasons = ["стресс", "корм", "вода", "температура", "плотность посадки"];
          }

          return {
            title: "Чек-лист первичной проверки",
            summary: "Ниже только безопасный бытовой чек-лист. Это не диагноз и не назначение лечения.",
            sections: [
              { title: "Возможные бытовые причины", content: reasons },
              { title: "Что проверить в первую очередь", content: ["Корм и свежесть воды.", "Световой режим и температуру.", "Чистоту подстилки, кормушек и поилок.", "Нет ли скученности, сырости или сквозняков."] },
              { title: "Когда срочно обращаться к ветеринару", content: ["Есть падёж или резкое ухудшение состояния.", "Птица отказывается от воды.", "Вялость выраженная и не проходит после проверки условий.", "Есть подозрение на инфекцию."] },
              { title: "Что не стоит делать самостоятельно", content: ["Не назначать лекарства наугад.", "Не давать дозировки без специалиста.", "Не считать это диагнозом по одному симптому."] }
            ],
            warning: (dataStore.recommendationTemplates.problems && dataStore.recommendationTemplates.problems.mandatoryWarning) || dataStore.safetyRules.safeHealthResponse
          };
        }

        function buildBeginner(answers) {
          var birdId = answers.desiredResult === "family_meat" ? "ducks" : answers.desiredResult === "try_farm" ? "quails" : "chickens";
          var bird = dataStore.poultryCatalog[birdId] || { name: "Куры" };
          state.profile.birdType = birdId;

          return {
            title: "План запуска для новичка",
            summary: "Ниже самый спокойный старт, чтобы войти в птицеводство без перегруза.",
            sections: [
              { title: "Рекомендуемый старт", content: "Лучше начать с варианта " + bird.name + " и небольшого масштаба." },
              { title: "План подготовки на 30 дней", content: ["Неделя 1: выбрать птицу, место и масштаб.", "Неделя 2: подготовить помещение, поилки, кормушки и подстилку.", "Неделя 3: закупить стартовый корм и всё проверить.", "Неделя 4: завести первую птицу и наблюдать за режимом."] },
              { title: "Минимальный список покупок", content: ["Поилки и кормушки.", "Подстилка и запас корма.", "Инвентарь для уборки.", "Освещение и защита от сырости."] },
              { title: "Ошибки новичков", content: ["Начинать слишком большим объёмом.", "Покупать птицу до подготовки помещения.", "Слишком резко менять рацион и условия."] },
              { title: "Следующий шаг", content: "Выберите породу и затем переходите к расчёту хозяйства." }
            ],
            visuals: birdVisual(birdId) ? [birdVisual(birdId)] : [],
            followUps: [
              { action: "choose_breeds", title: "Выбрать породы", description: "Собрать подходящие породы под старт." },
              { action: "calculate_farm", title: "Рассчитать хозяйство", description: "Прикинуть площадь, корм и оборудование." }
            ]
          };
        }

        function followUp(action) {
          if (action === "choose_breeds") {
            var birdId = state.profile.birdType;
            var bird = dataStore.poultryCatalog[birdId];
            if (!bird || !bird.recommendedBreeds) {
              pushMessage("system", "Подсказка", "Сначала лучше выбрать птицу.");
              render();
              return;
            }

            var breedKey = mapBreedKey(state.profile.purpose);
            var breeds = bird.recommendedBreeds[breedKey] || bird.recommendedBreeds.universal || bird.recommendedBreeds.eggs || bird.recommendedBreeds.meat || [];
            state.pending = {
              type: "breed",
              title: "Выберите породу",
              subtitle: "Сохраним выбор и продолжим маршрут",
              options: breeds.map(function (breed) {
                return { value: breed, label: breed, description: "Сохранить этот вариант" };
              })
            };
            render();
            return;
          }

          if (action === "calculate_farm" || action === "feeding" || action === "economics") {
            startScenario(action);
          }
        }

        function handlePending(value) {
          if (!state.pending) {
            return;
          }

          if (state.pending.type === "breed") {
            state.profile.breed = value;
            pushMessage("user", "Вы", value);
            pushMessage("assistant", dataStore.appConfig.appName, "Порода сохранена. Теперь можно перейти к расчёту хозяйства, кормлению или экономике.");
            state.pending = {
              type: "next",
              title: "Что делаем дальше?",
              subtitle: "Выбор птицы уже сохранён",
              options: [
                { value: "calculate_farm", label: "Рассчитать хозяйство", description: "Площадь, выгул, корм и оборудование." },
                { value: "feeding", label: "Подобрать кормление", description: "Собрать базовую схему кормления." },
                { value: "economics", label: "Прикинуть экономику", description: "Сравнить расходы и ориентир по результату." }
              ]
            };
            render();
            return;
          }

          if (state.pending.type === "next") {
            state.pending = null;
            startScenario(value);
          }
        }

        function handleText() {
          var text = String(state.draft || "").trim();
          if (!text) {
            return;
          }

          pushMessage("user", "Вы", text);
          state.draft = "";

          var low = text.toLowerCase();
          if (state.freeMode) {
            if (/(бол|симптом|вял|не ест|не пьет|скорлуп|нес)/.test(low)) {
              pushMessage("assistant", dataStore.appConfig.appName, dataStore.safetyRules.safeHealthResponse);
            } else if (low.indexOf("куры") !== -1 || low.indexOf("переп") !== -1) {
              pushMessage("assistant", dataStore.appConfig.appName, "Для спокойного старта чаще всего выбирают кур-несушек, а перепела хороши, если места мало и нужен компактный проект.");
            } else if (low.indexOf("корм") !== -1) {
              pushMessage("assistant", dataStore.appConfig.appName, "Для кормления удобнее пройти сценарий «Подобрать кормление»: он учитывает вид птицы, возраст и цель.");
            } else {
              pushMessage("assistant", dataStore.appConfig.appName, "Могу помочь по выбору птицы, условиям содержания, кормлению, базовой экономике и безопасной первичной проверке частых проблем.");
            }
          } else {
            pushMessage("assistant", dataStore.appConfig.appName, "Понял. Если хотите идти по шагам, выберите сценарий плиткой ниже. Если вопрос про симптомы, я дам только безопасный чек-лист без диагноза и лекарств.");
          }

          render();
        }

        function showFatal(message) {
          app.innerHTML = '<div style="max-width: 960px; margin: 40px auto; padding: 24px; font-family: Trebuchet MS, Segoe UI, sans-serif; color: #283126;"><h1>Умный птичник</h1><p>' + escapeHtml(message) + "</p></div>";
        }

        function loadJson(path, fallback) {
          return fetch(path, { cache: "no-store" })
            .then(function (response) {
              if (!response.ok) {
                throw new Error("HTTP " + response.status);
              }
              return response.json();
            })
            .catch(function () {
              return fallback;
            });
        }

        Promise.all([
          loadJson("./data/app_config.json", dataStore.appConfig),
          loadJson("./data/scenarios.json", dataStore.scenarios),
          loadJson("./data/poultry_catalog.json", dataStore.poultryCatalog),
          loadJson("./data/housing_norms.json", dataStore.housingNorms),
          loadJson("./data/recommendation_templates.json", dataStore.recommendationTemplates),
          loadJson("./data/safety_rules.json", dataStore.safetyRules),
          loadJson("./data/visual_assets.json", dataStore.visualAssets)
        ]).then(function (result) {
          dataStore.appConfig = result[0];
          dataStore.scenarios = result[1];
          dataStore.poultryCatalog = result[2];
          dataStore.housingNorms = result[3];
          dataStore.recommendationTemplates = result[4];
          dataStore.safetyRules = result[5];
          dataStore.visualAssets = result[6];
          resetConversation();
        }).catch(function () {
          showFatal("Не удалось загрузить данные приложения.");
        });
      })();
    </script>
  </body>
</html>
